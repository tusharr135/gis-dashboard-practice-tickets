<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus City | Smart GIS Dashboard</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Marker Cluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --panel-border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        header {
            height: 60px;
            background: var(--sidebar-bg);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .branding { display: flex; align-items: center; gap: 10px; }
        .branding h1 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); }

        #sidebar-toggle {
            background: transparent;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            margin-right: 15px;
        }
        #sidebar-toggle:hover {
            color: var(--accent);
        }

        .sidebar-hidden {
            width: 0 !important;
            min-width: 0 !important;
            border-right: none;
        }
        
        .live-stats { display: flex; gap: 20px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-value { color: var(--success); }

        /* Main Layout */
        main { display: flex; flex: 1; position: relative; overflow: hidden; }

        /* Sidebar */
        #sidebar {
            width: 320px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .sidebar-section { padding: 20px; border-bottom: 1px solid var(--panel-border); }
        .sidebar-section h3 { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }

        /* Layer Toggles */
        .layer-control { display: flex; flex-direction: column; gap: 10px; }
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-row:hover { background: rgba(255,255,255,0.1); }
        .toggle-row.active { border-left: 3px solid var(--accent); }

        /* Recent Searches */
        #recent-searches { list-style: none; font-size: 0.85rem; }
        #recent-searches li { 
            padding: 8px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; 
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #recent-searches li:hover { color: var(--accent); }

        /* Map Area */
        #map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #0b0e14; }

        /* Map Overlays (Search & Switcher) */
        .map-floating-search {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            width: 350px;
        }
        .search-box {
            background: var(--sidebar-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            width: 100%;
            outline: none;
        }
        .search-results {
            background: var(--sidebar-bg);
            border-radius: 8px;
            margin-top: 5px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--panel-border);
        }
        .result-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid var(--panel-border);
            font-size: 0.9rem;
        }
        .result-item:hover { background: rgba(255,255,255,0.05); color: var(--accent); }
        .search-error { padding: 12px; color: var(--danger); font-size: 0.8rem; }

        .map-type-switcher {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: var(--sidebar-bg);
            padding: 5px;
            border-radius: 8px;
            display: flex;
            gap: 5px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .type-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .type-btn.active { background: var(--accent); color: var(--bg-dark); }

        /* Custom Popup Style */
        .leaflet-popup-content-wrapper {
            background: var(--sidebar-bg);
            color: white;
            border-radius: 8px;
            border: 1px solid var(--accent);
        }
        .leaflet-popup-tip { background: var(--accent); }
        
        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #sidebar { display: none; } /* Simplified for demo, usually a hamburger menu */
            .map-floating-search { width: calc(100% - 40px); }
            .live-stats { display: none; }
        }
    </style>
</head>
<body>

<header>
    <button id="sidebar-toggle">☰</button>
    <div class="branding">
        <i data-lucide="shield-check" color="#38bdf8"></i>
        <h1>Nexus City <small style="font-size: 0.6rem; vertical-align: middle; opacity: 0.6;">OS INTEL v4.2</small></h1>
    </div>
    <div class="live-stats">
        <div class="stat-item">
            <span>NETWORK STATUS</span>
            <span class="stat-value">OPTIMAL</span>
        </div>
        <div class="stat-item">
            <span>ACTIVE NODES</span>
            <span class="stat-value" id="node-count">0</span>
        </div>
        <div class="stat-item">
            <span>ALERTS</span>
            <span class="stat-value" style="color: var(--danger);">02</span>
        </div>
        <div class="stat-item">
            <span>LATITUDE</span>
            <span class="stat-value" id="lat-value">0.0000</span>
        </div>
        <div class="stat-item">
            <span>LONGITUDE</span>
            <span class="stat-value" id="lng-value">0.0000</span>
        </div>
    </div>
</header>

<main>
    <div id="sidebar">
        <div class="sidebar-section">
            <h3>Infrastructure Layers</h3>
            <div class="layer-control" id="layer-toggles">
                <!-- Toggles generated by JS -->
            </div>
        </div>
        <div class="sidebar-section" style="flex: 1;">
            <h3>Recent Activity</h3>
            <ul id="recent-searches">
                <!-- Searches added here -->
            </ul>
        </div>
        <div class="sidebar-section" style="font-size: 0.7rem; color: var(--text-dim);">
            Powered by Leaflet & OSM Nominatim.<br>Usage Policy Compliant.
        </div>
    </div>

    <div id="map-container">
        <!-- Map Search Overlay -->
        <div class="map-floating-search">
            <div class="search-box">
                <i data-lucide="search" size="18" color="#94a3b8"></i>
                <input type="text" id="map-search-input" placeholder="Search locations, infrastructure..." autocomplete="off">
                <div id="search-loading" style="display: none;"><i data-lucide="loader-2" class="spin"></i></div>
            </div>
            <div id="search-results-panel" class="search-results"></div>
        </div>

        <!-- Map Element -->
        <div id="map"></div>

        <!-- Base Map Switcher -->
        <div class="map-type-switcher">
            <button class="type-btn active" data-type="street">Street</button>
            <button class="type-btn" data-type="satellite">Satellite</button>
            <button class="type-btn" data-type="terrain">Terrain</button>
            <button class="type-btn" data-type="dark">Dark</button>
        </div>
    </div>
</main>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Marker Cluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    /**
     * SMART CITY DASHBOARD ENGINE
     */

    // 1. CONFIGURATION & STATE
    const CONFIG = {
        initialView: [37.7749, -122.4194], // San Francisco
        zoom: 13,
        nominatimRateLimit: 1000, // 1 second as per policy
        userAgent: "NexusCitySmartDashboard/1.0 (contact: demo@nexuscity.io)"
    };

    let activeBaseLayer = null;
    let map = null;
    let lastSearchTime = 0;
    let searchTimeout = null;
    const markers = {}; // Store overlay groups
    const poiData = [
        { id: 'wifi',   label: 'Public WiFi',     icon: 'wifi',       color: '#38bdf8', count: 40  },
        { id: 'ev',     label: 'EV Stations',     icon: 'zap',        color: '#22c55e', count: 25  },
        { id: 'traffic',label: 'Traffic Sensors', icon: 'activity',   color: '#f59e0b', count: 50  },
        { id: 'solar',  label: 'Solar Panels',    icon: 'sun',        color: '#facc15', count: 50 },
        { id: 'it',     label: 'IT Companies',    icon: 'building-2', color: '#a78bfa', count: 30 }
    ];

    function updateNodeCount() {
    let total = 0;

    poiData.forEach(category => {
        total += category.count;
    });

    document.getElementById("node-count").innerText = total;
}


    // 2. NODE COUNT UPDATER
    function updateNodeCount() {
        let total = 0;
        poiData.forEach(category => {
            total += category.count;
        });
        document.getElementById("node-count").innerText = total;
    }

    // 3. MAP INITIALIZATION
    function initMap() {
        map = L.map('map', {
            zoomControl: false, // Custom placement if needed
            attributionControl: true
        }).setView(CONFIG.initialView, CONFIG.zoom);

        // Define Base Layers
        const baseLayers = {
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }),
            satellite: L.layerGroup([
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
                }),
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
                    pane: 'shadowPane' // Ensure labels stay on top
                })
            ]),
            terrain: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
                attribution: 'Map data: &copy; OSM, SRTM | Map style: &copy; OpenTopoMap'
            }),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB'
            })
        };

        // Set Default Base
        activeBaseLayer = baseLayers.street;
        activeBaseLayer.addTo(map);

        const zoomLevel = document.getElementById("zoom-level");

zoomLevel.innerText = map.getZoom();

map.on("zoomend", () => {
    zoomLevel.innerText = map.getZoom();
});

        // Handle Base Switching
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const type = e.target.dataset.type;
                
                // Remove current active
                map.removeLayer(activeBaseLayer);
                
                // Add new active
                activeBaseLayer = baseLayers[type];
                activeBaseLayer.addTo(map);

                // UI Update
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            });
        });

        initOverlays();
        setupSearch();
        setupCoordinateTracker();
        updateNodeCount();
    }

    // 3. DATA OVERLAYS & CLUSTERING
    function initOverlays() {
        const toggleContainer = document.getElementById('layer-toggles');

        poiData.forEach((category, index) => {
            // Create Marker Cluster Group with custom colored clusters
            const clusterGroup = L.markerClusterGroup({
                showCoverageOnHover: false,
                spiderfyOnMaxZoom: true,
                iconCreateFunction: function(cluster) {
                    const childCount = cluster.getChildCount();
                    const isTopLevel = childCount === category.count;
                    const displayCount = childCount;
                    const size = childCount >= 100 ? 44 : childCount >= 10 ? 38 : 32;
                    return L.divIcon({
                        html: `<div style="
                            background: ${category.color};
                            color: #0f172a;
                            width: ${size}px;
                            height: ${size}px;
                            border-radius: 50%;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            font-weight: 700;
                            font-size: ${childCount >= 100 ? 11 : 12}px;
                            border: 2px solid white;
                            box-shadow: 0 0 8px ${category.color};
                        ">${displayCount}</div>`,
                        className: '',
                        iconSize: [size, size]
                    });
                }
            });
            console.log(category.id, clusterGroup);

            // Generate Mock Data around the center
            generateMockData(category.count, category.color, index).forEach(pt => {
                const marker = L.circleMarker([pt.lat, pt.lng], {
                    radius: 8,
                    fillColor: category.color,
                    color: "#fff",
                    weight: 2,
                    fillOpacity: 0.8
                }).bindPopup(`
                    <div style="color: white">
                        <strong style="color: ${category.color}">${category.label.toUpperCase()} NODE</strong><br>
                        Status: Active<br>
                        ID: ${Math.random().toString(36).substr(2, 9).toUpperCase()}
                    </div>
                `);
                clusterGroup.addLayer(marker);
            });

            markers[category.id] = clusterGroup;

            // Create UI Toggle
            const row = document.createElement('div');
            row.className = 'toggle-row active';
            row.innerHTML = `
                <span style="display:flex; align-items:center; gap:10px;">
                    <i data-lucide="${category.icon}" size="16" color="${category.color}"></i>
                    ${category.label} (${category.count})
                </span>
                <div class="status-indicator" style="width:8px; height:8px; border-radius:50%; background:${category.color}"></div>
            `;
            
            row.onclick = () => {
                console.log("Toggling:", category.id);
                if (map.hasLayer(markers[category.id])) {
                    map.removeLayer(markers[category.id]);
                    console.log("OFF:", category.id);
                    row.classList.remove('active');
                    row.querySelector('.status-indicator').style.background = '#334155';
                } else {
                    map.addLayer(markers[category.id]);
                    console.log("ON:", category.id);
                    row.classList.add('active');
                    row.querySelector('.status-indicator').style.background = category.color;
                }
                getVisibleNodeCount(); // 🔥 update count
            };

            toggleContainer.appendChild(row);
            // Only first layer on by default
            if (index === 0) {
                clusterGroup.addTo(map);
            } else {
                row.classList.remove('active');
                row.querySelector('.status-indicator').style.background = '#334155';
            }
        });
        
        lucide.createIcons();
        getVisibleNodeCount();
    }

    function generateMockData(count, color, seed) {
        const pts = [];
        // Tightly constrained to SF city land only (excludes bay, ocean, marin)
        const sfZones = [
            { minLat: 37.745, maxLat: 37.800, minLng: -122.480, maxLng: -122.385 }, // Central SF
            { minLat: 37.720, maxLat: 37.745, minLng: -122.470, maxLng: -122.390 }, // South SF
            { minLat: 37.800, maxLat: 37.810, minLng: -122.460, maxLng: -122.400 }, // North SF
            { minLat: 37.745, maxLat: 37.790, minLng: -122.385, maxLng: -122.355 }, // East SF (Mission/Potrero)
        ];

        for (let i = 0; i < count; i++) {
            const zone = sfZones[Math.floor(Math.random() * sfZones.length)];
            pts.push({
                lat: zone.minLat + Math.random() * (zone.maxLat - zone.minLat),
                lng: zone.minLng + Math.random() * (zone.maxLng - zone.minLng)
            });
        }
        return pts;
    }

    // 4. SEARCH LOGIC (NOMINATIM)
    function setupSearch() {
        const input = document.getElementById('map-search-input');
        const resultsPanel = document.getElementById('search-results-panel');
        const recentList = document.getElementById('recent-searches');

        input.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();

            if (query.length < 3) {
                resultsPanel.style.display = 'none';
                return;
            }

            // Debounce for 1 second to respect Nominatim usage policy
            searchTimeout = setTimeout(() => {
                performSearch(query);
            }, 1000);
        });

        async function performSearch(query) {
            resultsPanel.innerHTML = '<div class="search-error">Searching Nexus Database...</div>';
            resultsPanel.style.display = 'block';

            try {
                // Policy requirement: custom user agent via Referer (standard browser fetch)
                // Note: Browser JS cannot set User-Agent header, so we rely on fetch defaults 
                // and avoid high frequency requests via the debouncer.
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5`, {
                    headers: { 'Accept-Language': 'en-US,en;q=0.9' }
                });

                if (!response.ok) throw new Error("Network Response Fail");

                const data = await response.json();
                renderResults(data);
            } catch (err) {
                resultsPanel.innerHTML = `<div class="search-error">Search Service Unavailable.</div>`;
            }
        }

        function renderResults(data) {
            resultsPanel.innerHTML = '';
            if (data.length === 0) {
                resultsPanel.innerHTML = '<div class="search-error">No results found.</div>';
                return;
            }

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerText = item.display_name;
                div.onclick = () => selectLocation(item);
                resultsPanel.appendChild(div);
            });
        }

        function selectLocation(item) {
            const lat = parseFloat(item.lat);
            const lon = parseFloat(item.lon);

            // Fly to location
            map.flyTo([lat, lon], 15);

            // Drop Marker
            const marker = L.marker([lat, lon]).addTo(map)
                .bindPopup(`<strong>${item.display_name}</strong>`)
                .openPopup();

            // Clear search UI
            resultsPanel.style.display = 'none';
            input.value = '';

            // Update Recent (Session Only)
            const li = document.createElement('li');
            li.innerText = item.display_name.split(',')[0];
            li.onclick = () => map.flyTo([lat, lon], 15);
            recentList.prepend(li);
        }
    }

    // 5. COORDINATE TRACKER
    function setupCoordinateTracker() {
        const latValue = document.getElementById("lat-value");
        const lngValue = document.getElementById("lng-value");
        map.on("mousemove", function(e) {
            latValue.innerText = e.latlng.lat.toFixed(4);
            lngValue.innerText = e.latlng.lng.toFixed(4);
        });
    }

    // 6. RESTORE SIDEBAR STATE
    function restoreSidebarState() {
        const sidebar = document.getElementById("sidebar");
        const isHidden = localStorage.getItem("sidebarHidden");
        if (isHidden === "true") {
            sidebar.classList.add("sidebar-hidden");
        }
    }

    // Initialize on load
    window.onload = () => {
        initMap();
        restoreSidebarState();

        document
            .getElementById("sidebar-toggle")
            .addEventListener("click", () => {
                document
                    .getElementById("sidebar")
                    .classList.toggle("sidebar-hidden");
                const isHidden = document
                    .getElementById("sidebar")
                    .classList.contains("sidebar-hidden");
                localStorage.setItem("sidebarHidden", isHidden);
                setTimeout(() => {
                    map.invalidateSize();
                }, 300);
            });
    };
    lucide.createIcons();

map.on("zoomend", () => {
  document.getElementById("zoom-level").innerText =
      map.getZoom();
});

function getVisibleNodeCount() {

    let total = 0;

    poiData.forEach(category => {

        if(map.hasLayer(markers[category.id])) {
            total += category.count;
        }

    });

    document.getElementById("node-count").innerText = total;
}

row.onclick = () => {

    if (map.hasLayer(markers[category.id])) {

        map.removeLayer(markers[category.id]);

    } else {

        map.addLayer(markers[category.id]);

    }

    getVisibleNodeCount();
}
</script>
<div class="live-stats">
    <div class="stat-item">
        <span>NETWORK STATUS</span>
        <span class="stat-value">OPTIMAL</span>
    </div>

    <div class="stat-item">
        <span>ZOOM LEVEL</span>
        <span class="stat-value" id="zoom-level">13</span>
    </div>

    <div class="stat-item">
        <span>ACTIVE NODES</span>
        <span class="stat-value" id="node-count">1,248</span>
    </div>
</div>

</body>
</html>
